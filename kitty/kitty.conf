# --- Font ---
font_family      Maple Mono NF CN
font_size        12.0

# --- Theme / Colors ---
# Matches the dark grey (#1e1e1e) of your Waybar boxes
foreground            #ffffff
background            #1e1e1e
background_opacity    0.8

# --- Window Styling ---
# This creates the "inner margin" so text isn't touching the edges
window_padding_width  15

# --- Cursor Styling ---
cursor                #ffffff
cursor_shape          beam
cursor_beam_thickness 1.5

# --- Tab Bar (If you use tabs) ---
tab_bar_style        powerline
active_tab_foreground   #1e1e1e
active_tab_background   #ffffff
inactive_tab_foreground #ffffff
inactive_tab_background #1e1e1e

# --- Terminal Colors (The Monochrome Look) ---
# This ensures that even when programs use colors, they stay white/grey
color0  #1e1e1e
color8  #555555
color1  #ffffff
color9  #ffffff
color2  #ffffff
color10 #ffffff
color3  #ffffff
color11 #ffffff
color4  #ffffff
color12 #ffffff
color5  #ffffff
color13 #ffffff
color6  #ffffff
color14 #ffffff
color7  #c0c0c0
color15 #ffffff